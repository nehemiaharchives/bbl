---
driver:
  name: local

transport:
  name: exec

provisioner:
  name: chef_infra
  require_chef_omnibus: false
  chef_license: accept-no-persist
  chef_client_path: <%= File.expand_path("support/chef-client-rubygem.bat", __dir__).tr("/", "\\") %>
  client_rb:
    auth_key_registry_type: user

verifier:
  name: inspec

platforms:
  - name: windows-local

suites:
  - name: default
    run_list:
      - recipe[bbl_install_windows::default]
