---
driver:
  name: dokken
  chef_version: 18.10.17

transport:
  name: dokken

provisioner:
  name: dokken
  chef_license: accept-no-persist

verifier:
  name: inspec

platforms:
  - name: ubuntu-26.04
    driver:
      image: dokken/ubuntu-26.04
      privileged: true
      pid_one_command: /lib/systemd/systemd

  - name: ubuntu-25.10
    driver:
      image: dokken/ubuntu-25.10
      privileged: true
      pid_one_command: /lib/systemd/systemd

  - name: ubuntu-24.04
    driver:
      image: dokken/ubuntu-24.04
      privileged: true
      pid_one_command: /lib/systemd/systemd

  - name: ubuntu-22.04
    driver:
      image: dokken/ubuntu-22.04
      privileged: true
      pid_one_command: /lib/systemd/systemd

  - name: windows-local
    driver:
      name: local
    transport:
      name: exec
    lifecycle:
      post_destroy:
        - local: powershell -NoProfile -ExecutionPolicy Bypass -File support/cleanup-windows-local.ps1
    provisioner:
      name: chef_infra
      require_chef_omnibus: false
      chef_license: accept-no-persist
      chef_client_path: <%= File.expand_path("support/chef-client-rubygem.bat", __dir__).tr("/", "\\") %>
      client_rb:
        auth_key_registry_type: user

  - name: macos-local
    driver:
      name: local
    transport:
      name: exec
    lifecycle:
      post_destroy:
        - local: sh support/cleanup-macos-local.sh
    provisioner:
      name: chef_infra
      command_prefix: PATH=/usr/local/opt/ruby/bin:/opt/homebrew/opt/ruby/bin:$PATH
      sudo: false
      require_chef_omnibus: false
      chef_license: accept-no-persist
      chef_client_path: <%= File.expand_path("support/chef-client-rubygem.rb", __dir__) %>
    verifier:
      command_prefix: PATH=/usr/local/opt/ruby/bin:/opt/homebrew/opt/ruby/bin:$PATH
      sudo: false

suites:
  - name: default
    run_list:
      - recipe[bbl_install::default]
    verifier:
      inspec_tests:
        - test/integration/helpers
        - test/integration/default

  - name: pack_install_posix
    run_list:
      - recipe[bbl_install::default]
    attributes:
      bbl_install:
        install_source_dir: '/tmp/bbl-install-downloads'
        pack_names:
          - kjv.zip
        deferred_pack_names:
          - kjv.zip
    verifier:
      inspec_tests:
        - test/integration/helpers
        - test/integration/pack_install_posix
    excludes:
      - windows-local

  - name: pack_install_windows
    run_list:
      - recipe[bbl_install::default]
    attributes:
      bbl_install:
        install_source_dir: 'C:/Users/joel/AppData/Local/Temp/bbl-install-downloads'
    verifier:
      inspec_tests:
        - test/integration/helpers
        - test/integration/pack_install_windows
    excludes:
      - ubuntu-26.04
      - ubuntu-25.10
      - ubuntu-24.04
      - ubuntu-22.04
      - macos-local

  - name: search_posix
    run_list:
      - recipe[bbl_install::default]
      - recipe[bbl_install::search_posix_test]
    attributes:
      bbl_install:
        search_posix_test_script_path: /tmp/bbl-search-posix-test/test_search.sh
    verifier:
      name: shell
      remote_exec: true
      command: /tmp/bbl-search-posix-test/test_search.sh -ThrottleLimit <%= ENV.fetch('BBL_SEARCH_POSIX_THROTTLE', '1') %> -SearchTimeoutSeconds 180
    excludes:
      - windows-local

  - name: config_posix
    run_list:
      - recipe[bbl_install::default]
      - recipe[bbl_install::config_posix_test]
    attributes:
      bbl_install:
        config_posix_test_script_path: /tmp/bbl-config-posix-test/test_config.sh
    verifier:
      name: shell
      remote_exec: true
      command: /tmp/bbl-config-posix-test/test_config.sh
    excludes:
      - windows-local

  - name: search_windows
    run_list:
      - recipe[bbl_install::default]
    verifier:
      inspec_tests:
        - test/integration/helpers
        - test/integration/search_windows
    excludes:
      - ubuntu-26.04
      - ubuntu-25.10
      - ubuntu-24.04
      - ubuntu-22.04
      - macos-local
