---
driver:
  name: dokken
  chef_version: 18.10.17

transport:
  name: dokken

provisioner:
  name: dokken

verifier:
  name: inspec

platforms:
  - name: ubuntu-24.04
    driver:
      image: dokken/ubuntu-24.04
      privileged: true
      pid_one_command: /bin/systemd

  - name: windows-local
    driver:
      name: local
    transport:
      name: exec
    provisioner:
      name: chef_infra
      require_chef_omnibus: false
      chef_license: accept-no-persist
      chef_client_path: <%= File.expand_path("support/chef-client-rubygem.bat", __dir__).tr("/", "\\") %>
      client_rb:
        auth_key_registry_type: user

  - name: macos-local
    driver:
      name: local
    transport:
      name: exec
    provisioner:
      name: chef_infra
      sudo: true
      require_chef_omnibus: false
      chef_license: accept-no-persist
      chef_client_path: <%= File.expand_path("support/chef-client-rubygem.rb", __dir__) %>

suites:
  - name: default
    run_list:
      - recipe[bbl_install::default]
