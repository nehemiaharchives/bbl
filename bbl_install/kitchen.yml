---
driver:
  name: dokken
  chef_version: 18.10.17

transport:
  name: dokken

provisioner:
  name: dokken
  chef_license: accept-no-persist

verifier:
  name: inspec

platforms:
  - name: ubuntu-26.04
    driver:
      image: dokken/ubuntu-26.04
      privileged: true
      pid_one_command: /lib/systemd/systemd

  - name: ubuntu-25.10
    driver:
      image: dokken/ubuntu-25.10
      privileged: true
      pid_one_command: /lib/systemd/systemd

  - name: ubuntu-24.04
    driver:
      image: dokken/ubuntu-24.04
      privileged: true
      pid_one_command: /lib/systemd/systemd

  - name: ubuntu-arm64-24.04
    driver:
      image: dokken/ubuntu-24.04
      privileged: true
      pid_one_command: /lib/systemd/systemd

  - name: ubuntu-22.04
    driver:
      image: dokken/ubuntu-22.04
      privileged: true
      pid_one_command: /lib/systemd/systemd

  - name: fedora-latest
    driver:
      image: dokken/fedora-latest
      privileged: true
      pid_one_command: /usr/lib/systemd/systemd

  - name: archlinux-latest
    driver:
      image: archlinux/archlinux:latest
      privileged: true
      intermediate_instructions:
        - RUN pacman -Sy --noconfirm libxcrypt-compat && pacman -Scc --noconfirm

  - name: alpine-latest
    driver:
      image: alpine:latest
      privileged: true
      intermediate_instructions:
        - RUN apk add --no-cache bash binutils ca-certificates curl file gcompat libgcc libstdc++ shadow

  - name: windows-local
    driver:
      name: local
    transport:
      name: exec
    lifecycle:
      post_destroy:
        - local: powershell -NoProfile -ExecutionPolicy Bypass -File support/cleanup-windows-local.ps1
    provisioner:
      name: chef_infra
      require_chef_omnibus: false
      chef_license: accept-no-persist
      chef_client_path: <%= File.expand_path("support/chef-client-rubygem.bat", __dir__).tr("/", "\\") %>

  - name: macos-local
    driver:
      name: local
    transport:
      name: exec
    lifecycle:
      post_destroy:
        - local: sh support/cleanup-macos-local.sh
    provisioner:
      name: chef_infra
      command_prefix: PATH=/usr/local/opt/ruby/bin:/opt/homebrew/opt/ruby/bin:$PATH
      sudo: false
      require_chef_omnibus: false
      chef_license: accept-no-persist
      chef_client_path: <%= File.expand_path("support/chef-client-rubygem.rb", __dir__) %>
    verifier:
      command_prefix: PATH=/usr/local/opt/ruby/bin:/opt/homebrew/opt/ruby/bin:$PATH
      sudo: false

suites:
  - name: homebrew_install_macos
    run_list:
      - recipe[bbl_install::homebrew_install_macos]
    verifier:
      inspec_tests:
        - test/integration/homebrew_install_macos
    includes:
      - macos-local

  - name: pkg_install_macos
    run_list:
      - recipe[bbl_install::pkg_install_macos]
    verifier:
      inspec_tests:
        - test/integration/pkg_install_macos
    includes:
      - macos-local

  - name: deb_install
    run_list:
      - recipe[bbl_install::deb_install_ubuntu]
    verifier:
      inspec_tests:
        - test/integration/deb_install_ubuntu
    includes:
      - ubuntu-26.04
      - ubuntu-25.10
      - ubuntu-24.04
      - ubuntu-22.04
      - ubuntu-arm64-24.04

  - name: rpm_install_fedora
    run_list:
      - recipe[bbl_install::rpm_install_fedora]
    verifier:
      inspec_tests:
        - test/integration/rpm_install_fedora
    includes:
      - fedora-latest

  - name: pacman_install_archlinux
    run_list:
      - recipe[bbl_install::pacman_install_archlinux]
    verifier:
      inspec_tests:
        - test/integration/pacman_install_archlinux
    includes:
      - archlinux-latest

  - name: apk_install_alpine
    run_list:
      - recipe[bbl_install::apk_install_alpine]
    verifier:
      inspec_tests:
        - test/integration/apk_install_alpine
    includes:
      - alpine-latest

  - name: default
    run_list:
      - recipe[bbl_install::default]
    verifier:
      inspec_tests:
        - test/integration/helpers
        - test/integration/default
    excludes:
      - alpine-latest

  - name: pack_install_posix
    run_list:
      - recipe[bbl_install::default]
    attributes:
      bbl_install:
        install_source_dir: '/tmp/bbl-install-downloads'
        pack_names:
          - kjv.zip
        deferred_pack_names:
          - kjv.zip
          - webus.zip
        deferred_helper_bin_names:
          - bbl-search-common
        clean_pack_dir: true
        clean_install_source_dir: true
    verifier:
      inspec_tests:
        - test/integration/helpers
        - test/integration/pack_install_posix
    excludes:
      - windows-local
      - alpine-latest

  - name: pack_install_windows
    run_list:
      - recipe[bbl_install::default]
    attributes:
      bbl_install:
        install_source_dir: '<%= File.join(ENV["TEMP"] || ENV["TMP"] || "/tmp", "bbl-install-downloads").tr("\\", "/") %>'
        pack_names:
          - kjv.zip
        deferred_pack_names:
          - kjv.zip
          - webus.zip
        deferred_helper_bin_names:
          - bbl-search-common.exe
        clean_pack_dir: true
        clean_install_source_dir: true
    verifier:
      inspec_tests:
        - test/integration/helpers
        - test/integration/pack_install_windows
    includes:
      - windows-local

  - name: search_posix
    run_list:
      - recipe[bbl_install::default]
      - recipe[bbl_install::search_posix_test]
    attributes:
      bbl_install:
        search_posix_test_script_path: /tmp/bbl-search-posix-test/test_search.sh
    verifier:
      name: shell
      remote_exec: true
      command: /tmp/bbl-search-posix-test/test_search.sh -ThrottleLimit <%= ENV.fetch('BBL_SEARCH_POSIX_THROTTLE', '8') %> -SearchTimeoutSeconds 180
    excludes:
      - windows-local
      - alpine-latest

  - name: config_posix
    run_list:
      - recipe[bbl_install::default]
      - recipe[bbl_install::config_posix_test]
    attributes:
      bbl_install:
        config_posix_test_script_path: /tmp/bbl-config-posix-test/test_config.sh
    verifier:
      name: shell
      remote_exec: true
      command: /tmp/bbl-config-posix-test/test_config.sh
    excludes:
      - windows-local
      - alpine-latest

  - name: completion_posix
    run_list:
      - recipe[bbl_install::default]
      - recipe[bbl_install::install_shell_ubuntu]
      - recipe[bbl_install::install_shell_macos]
      - recipe[bbl_install::completion_posix_test]
    attributes:
      bbl_install:
        completion_posix_test_script_path: /tmp/bbl-completion-posix-test/test_completion.sh
    verifier:
      name: shell
      remote_exec: true
      command: /tmp/bbl-completion-posix-test/test_completion.sh
    excludes:
      - windows-local
      - alpine-latest

  - name: history_posix
    run_list:
      - recipe[bbl_install::default]
      - recipe[bbl_install::history_posix_test]
    attributes:
      bbl_install:
        history_posix_test_script_path: /tmp/bbl-history-posix-test/test_history.sh
    verifier:
      name: shell
      remote_exec: true
      command: /tmp/bbl-history-posix-test/test_history.sh
    excludes:
      - windows-local
      - alpine-latest

  - name: config_windows
    run_list:
      - recipe[bbl_install::default]
    verifier:
      inspec_tests:
        - test/integration/helpers
        - test/integration/config_windows
    includes:
      - windows-local

  - name: history_windows
    run_list:
      - recipe[bbl_install::default]
    verifier:
      inspec_tests:
        - test/integration/helpers
        - test/integration/history_windows
    includes:
      - windows-local

  - name: search_windows
    run_list:
      - recipe[bbl_install::default]
    verifier:
      inspec_tests:
        - test/integration/helpers
        - test/integration/search_windows
    includes:
      - windows-local

  - name: completion_windows
    run_list:
      - recipe[bbl_install::default]
    verifier:
      inspec_tests:
        - test/integration/helpers
        - test/integration/completion_windows
    includes:
      - windows-local

  - name: msi_install_windows
    run_list:
      - recipe[bbl_install::msi_install_windows]
    verifier:
      inspec_tests:
        - test/integration/msi_install_windows
    includes:
      - windows-local
