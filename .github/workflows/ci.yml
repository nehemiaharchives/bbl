            needs_konan_cache: true
            saves_konan_cache: true
            needs_xcode: true
            xcode_version: '16.4'
            fixture_task: stageBblInstallMacosArm64CliCoreCompletionFixtures "-Pbblpacks.embed=false"
            fixture_artifact_name: bbl-install-macos-cli-core-files
            fixture_path: build/bblInstallFixtures/macosArm64/cli-core
            job_type: Test
