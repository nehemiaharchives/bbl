name: CI

on:
  push:
    branches: [ master ]
    paths-ignore:
      - '**.md'
  pull_request:
    branches: [ master ]
    paths-ignore:
      - '**.md'

jobs:
  tests:
    name: ${{ matrix.job_type }} (${{ matrix.module_name }}/${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: ${{ matrix.timeout }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: jvm
            module_name: app-shared
            os: ubuntu-latest
            timeout: 10
            task: :app:shared:jvmTest
            job_type: Test
          - platform: android
            module_name: app-shared
            os: ubuntu-latest
            timeout: 15
            task: :app:shared:testAndroidHostTest
            needs_android: true
            job_type: Test
          - platform: ios
            module_name: app-shared
            os: macos-latest
            timeout: 20
            task: :app:shared:iosSimulatorArm64Test
            needs_konan_cache: true
            job_type: Test

          - platform: jvm
            module_name: cli-core
            os: ubuntu-latest
            timeout: 10
            task: :cli:core:jvmTest
            job_type: Test
          - platform: linux
            module_name: cli-core
            os: ubuntu-latest
            timeout: 60
            task: :cli:core:linuxX64Test
            needs_konan_cache: true
            saves_konan_cache: true
            fixture_task: stageBblInstallLinuxCliCoreCompletionFixtures "-Pbblpacks.embed=false"
            fixture_artifact_name: bbl-install-linux-cli-core-files
            fixture_path: build/bblInstallFixtures/linux/cli-core
            job_type: Test
          - platform: macos
