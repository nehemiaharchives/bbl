name: CI

on:
  push:
    branches: [ master ]
    paths-ignore:
      - '**.md'
      - '**.sh'
  pull_request:
    branches: [ master ]
    paths-ignore:
      - '**.md'
      - '**.sh'

jobs:
  tests:
    name: ${{ matrix.job_type }} (${{ matrix.platform }}/${{ matrix.module_name }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: ${{ matrix.timeout }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: jvm
            module_name: shared
            os: ubuntu-latest
            timeout: 10
            task: :shared:jvmTest
            job_type: Test
          - platform: android
            module_name: shared
            os: ubuntu-latest
            timeout: 15
            task: :shared:testAndroidHostTest
            needs_android: true
            job_type: Test
          - platform: ios
            module_name: shared
            os: macos-latest
            timeout: 20
            task: :shared:iosSimulatorArm64Test
            needs_konan_cache: true
            job_type: Test
          - platform: linux
            module_name: shared
            os: ubuntu-latest
            timeout: 20
            task: :shared:linuxX64Test
            needs_konan_cache: true
            job_type: Test
          - platform: mingw
            module_name: shared
            os: windows-latest
            timeout: 25
            task: :shared:mingwX64Test
            needs_konan_cache: true
            job_type: Test

          - platform: jvm
            module_name: cli-core
            os: ubuntu-latest
            timeout: 10
            task: :cli:core:jvmTest
            job_type: Test
          - platform: linux
            module_name: cli-core
            os: ubuntu-latest
            timeout: 20
            task: :cli:core:linuxX64Test
            needs_konan_cache: true
            job_type: Test
          - platform: macos
            module_name: cli-core
            os: macos-latest
            timeout: 25
            task: :cli:core:macosArm64Test
            needs_konan_cache: true
            needs_xcode: true
            xcode_version: '16.4'
            job_type: Test
          - platform: mingw
            module_name: cli-core
            os: windows-latest
            timeout: 30
            task: :cli:core:mingwX64Test
            needs_konan_cache: true
            job_type: Test

          - platform: jvm
            module_name: cli-search-common
            os: ubuntu-latest
            timeout: 10
            task: :cli:search:common:jvmTest
            job_type: Test
          - platform: linux
            module_name: cli-search-common
            os: ubuntu-latest
            timeout: 20
            task: :cli:search:common:linuxX64Test
            needs_konan_cache: true
            job_type: Test
          - platform: mingw
            module_name: cli-search-common
            os: windows-latest
            timeout: 25
            task: :cli:search:common:mingwX64Test
            needs_konan_cache: true
            job_type: Test

          - platform: jvm
            module_name: cli-search-extra
            os: ubuntu-latest
            timeout: 10
            task: :cli:search:extra:jvmTest
            job_type: Test
          - platform: linux
            module_name: cli-search-extra
            os: ubuntu-latest
            timeout: 20
            task: :cli:search:extra:linuxX64Test
            needs_konan_cache: true
            job_type: Test
          - platform: mingw
            module_name: cli-search-extra
            os: windows-latest
            timeout: 25
            task: :cli:search:extra:mingwX64Test
            needs_konan_cache: true
            job_type: Test

          - platform: jvm
            module_name: cli-search-kuromoji
            os: ubuntu-latest
            timeout: 10
            task: :cli:search:kuromoji:jvmTest
            job_type: Test
          - platform: linux
            module_name: cli-search-kuromoji
            os: ubuntu-latest
            timeout: 20
            task: :cli:search:kuromoji:linuxX64Test
            needs_konan_cache: true
            job_type: Test
          - platform: mingw
            module_name: cli-search-kuromoji
            os: windows-latest
            timeout: 25
            task: :cli:search:kuromoji:mingwX64Test
            needs_konan_cache: true
            job_type: Test

          - platform: jvm
            module_name: cli-search-morfologik
            os: ubuntu-latest
            timeout: 10
            task: :cli:search:morfologik:jvmTest
            job_type: Test
          - platform: linux
            module_name: cli-search-morfologik
            os: ubuntu-latest
            timeout: 20
            task: :cli:search:morfologik:linuxX64Test
            needs_konan_cache: true
            job_type: Test
          - platform: mingw
            module_name: cli-search-morfologik
            os: windows-latest
            timeout: 25
            task: :cli:search:morfologik:mingwX64Test
            needs_konan_cache: true
            job_type: Test

          - platform: jvm
            module_name: cli-search-nori
            os: ubuntu-latest
            timeout: 10
            task: :cli:search:nori:jvmTest
            job_type: Test
          - platform: linux
            module_name: cli-search-nori
            os: ubuntu-latest
            timeout: 20
            task: :cli:search:nori:linuxX64Test
            needs_konan_cache: true
            job_type: Test
          - platform: mingw
            module_name: cli-search-nori
            os: windows-latest
            timeout: 25
            task: :cli:search:nori:mingwX64Test
            needs_konan_cache: true
            job_type: Test

          - platform: jvm
            module_name: cli-search-smartcn
            os: ubuntu-latest
            timeout: 10
            task: :cli:search:smartcn:jvmTest
            job_type: Test
          - platform: linux
            module_name: cli-search-smartcn
            os: ubuntu-latest
            timeout: 20
            task: :cli:search:smartcn:linuxX64Test
            needs_konan_cache: true
            job_type: Test
          - platform: mingw
            module_name: cli-search-smartcn
            os: windows-latest
            timeout: 25
            task: :cli:search:smartcn:mingwX64Test
            needs_konan_cache: true
            job_type: Test

          - platform: jvm
            module_name: composeApp
            os: ubuntu-latest
            timeout: 10
            task: :composeApp:jvmTest
            job_type: Test
          - platform: android
            module_name: composeApp
            os: ubuntu-latest
            timeout: 15
            task: :composeApp:testAndroidHostTest
            needs_android: true
            job_type: Test
          - platform: ios
            module_name: composeApp
            os: macos-latest
            timeout: 25
            task: :composeApp:iosSimulatorArm64Test
            needs_konan_cache: true
            job_type: Test

          - platform: linux
            module_name: cli-core-build
            os: ubuntu-latest
            timeout: 60
            task: stageBblInstallCommonFixtures "-Pbblpacks.embed=false"
            needs_konan_cache: true
            job_type: Build
          - platform: macos
            module_name: cli-core-build
            os: macos-latest
            timeout: 25
            task: :cli:core:linkReleaseExecutableMacosArm64
            needs_konan_cache: true
            needs_xcode: true
            xcode_version: '16.4'
            job_type: Build
          - platform: mingw
            module_name: cli-core-build
            os: windows-latest
            timeout: 45
            task: stageBblInstallWindowsFixtures "-Pbblpacks.embed=false"
            needs_konan_cache: true
            job_type: Build

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up JDK 24
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '24'

      - name: Set up Android SDK
        if: ${{ matrix.needs_android }}
        uses: android-actions/setup-android@v3

      - name: Setup Xcode
        if: ${{ matrix.needs_xcode }}
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ matrix.xcode_version }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Konan Cache
        if: ${{ matrix.needs_konan_cache }}
        uses: actions/cache@v4
        with:
          path: ~/.konan
          key: ${{ runner.os }}-konan-${{ hashFiles('*.gradle.kts', 'gradle/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-konan-

      - name: Run task
        run: ./gradlew ${{ matrix.task }}

      - name: Upload Windows install fixtures
        if: ${{ matrix.platform == 'mingw' && matrix.module_name == 'cli-core-build' && matrix.job_type == 'Build' }}
        uses: actions/upload-artifact@v4
        with:
          name: bbl-install-windows-files
          path: bbl_install_windows/files/
          if-no-files-found: error
          retention-days: 1

      - name: Upload shared install fixtures
        if: ${{ matrix.platform == 'linux' && matrix.module_name == 'cli-core-build' && matrix.job_type == 'Build' }}
        uses: actions/upload-artifact@v4
        with:
          name: bbl-install-files
          path: bbl_install/files/
          if-no-files-found: error
          retention-days: 1

      - name: Build Summary
        if: always()
        run: |
          echo "### ${{ matrix.platform }} - ${{ matrix.module_name }} Status: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "* Workflow: ${{ github.workflow }}" >> $GITHUB_STEP_SUMMARY
          echo "* Run ID: ${{ github.run_id }}" >> $GITHUB_STEP_SUMMARY
          echo "* Triggered by: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "* Branch: ${{ github.ref }}" >> $GITHUB_STEP_SUMMARY

  e2e-linux-cli:
    name: E2E (linux/cli)
    needs: tests
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Download shared install fixtures
        uses: actions/download-artifact@v4
        with:
          name: bbl-install-files
          path: bbl_install/files

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
          working-directory: bbl_install

      - name: Restore Dokken Docker image
        id: cache-dokken-image
        uses: actions/cache@v4
        with:
          path: /tmp/docker-cache/dokken-ubuntu-24.04.tar
          key: dokken-ubuntu-24.04-v1

      - name: Load cached Dokken Docker image
        if: steps.cache-dokken-image.outputs.cache-hit == 'true'
        run: docker load --input /tmp/docker-cache/dokken-ubuntu-24.04.tar

      - name: Pull Dokken Docker image
        if: steps.cache-dokken-image.outputs.cache-hit != 'true'
        run: docker pull dokken/ubuntu-24.04

      - name: Save Dokken Docker image
        if: steps.cache-dokken-image.outputs.cache-hit != 'true'
        run: |
          mkdir -p /tmp/docker-cache
          docker save dokken/ubuntu-24.04 --output /tmp/docker-cache/dokken-ubuntu-24.04.tar

      - name: Kitchen create
        working-directory: bbl_install
        run: bundle exec kitchen create default-ubuntu-2404

      - name: Kitchen converge
        working-directory: bbl_install
        run: bundle exec kitchen converge default-ubuntu-2404

      - name: Kitchen verify
        working-directory: bbl_install
        run: bundle exec kitchen verify default-ubuntu-2404

      - name: Build Summary
        if: always()
        run: |
          echo "### E2E (linux/cli) Status: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "* Workflow: ${{ github.workflow }}" >> $GITHUB_STEP_SUMMARY
          echo "* Run ID: ${{ github.run_id }}" >> $GITHUB_STEP_SUMMARY
          echo "* Triggered by: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "* Branch: ${{ github.ref }}" >> $GITHUB_STEP_SUMMARY

  e2e-mingw-cli:
    name: E2E (mingw/cli)
    needs: tests
    runs-on: windows-latest
    timeout-minutes: 90

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Download shared install fixtures
        uses: actions/download-artifact@v4
        with:
          name: bbl-install-files
          path: bbl_install/files

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
          working-directory: bbl_install

      - name: Kitchen converge
        working-directory: bbl_install
        run: |
          $env:RUBY_EXE = (Get-Command ruby).Source
          bundle exec kitchen converge default-windows-local

      - name: Kitchen verify
        working-directory: bbl_install
        run: |
          $env:RUBY_EXE = (Get-Command ruby).Source
          bundle exec kitchen verify default-windows-local

      - name: Build Summary
        if: always()
        run: |
          echo "### E2E (mingw/cli) Status: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "* Workflow: ${{ github.workflow }}" >> $GITHUB_STEP_SUMMARY
          echo "* Run ID: ${{ github.run_id }}" >> $GITHUB_STEP_SUMMARY
          echo "* Triggered by: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "* Branch: ${{ github.ref }}" >> $GITHUB_STEP_SUMMARY
