    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up JDK 24
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '24'

      - name: Set up Android SDK
        if: ${{ matrix.needs_android }}
        uses: android-actions/setup-android@v3

      - name: Setup Xcode
        if: ${{ matrix.needs_xcode }}
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ matrix.xcode_version }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Restore Konan Cache
        id: konan-cache-restore
        if: ${{ matrix.needs_konan_cache }}
        uses: actions/cache/restore@v5
        with:
          path: ~/.konan
          key: ${{ runner.os }}-konan-${{ hashFiles('gradle/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-konan-

      - name: Run task
        run: ./gradlew ${{ matrix.task }}

      - name: Install nFPM
        if: ${{ matrix.needs_nfpm }}
        run: |
          set -euo pipefail
          echo 'deb [trusted=yes] https://repo.goreleaser.com/apt/ /' | sudo tee /etc/apt/sources.list.d/goreleaser.list
          sudo apt-get update
          sudo apt-get install -y nfpm
          nfpm --version

      - name: Setup .NET SDK
        if: ${{ matrix.module_name == 'installer-msi' }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install WiX Toolset
        if: ${{ matrix.module_name == 'installer-msi' }}
        env:
          WIX_OSMF_EULA: accept
        run: dotnet tool install --global wix

      - name: Run fixture task
        if: ${{ matrix.fixture_task }}
        env:
          WIX_OSMF_EULA: ${{ matrix.module_name == 'installer-msi' && 'accept' || '' }}
        run: ./gradlew ${{ matrix.fixture_task }}

      - name: Upload fixture artifact
        if: ${{ matrix.fixture_artifact_name }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.fixture_artifact_name }}
          path: |
            ${{ matrix.fixture_path || 'bbl_install/files/' }}
            build/bblInstallFixtures/common
          if-no-files-found: error
          retention-days: 1

      # A cache key is immutable. Only one job per runner OS should compress and
      # save ~/.konan; all other native jobs are restore-only consumers.
      - name: Save Konan Cache
        if: ${{ matrix.saves_konan_cache && steps.konan-cache-restore.outputs.cache-hit != 'true' }}
        uses: actions/cache/save@v5
        with:
          path: ~/.konan
          key: ${{ steps.konan-cache-restore.outputs.cache-primary-key }}

      - name: Build Summary
        if: always()
        run: |
          echo "### ${{ matrix.platform }} - ${{ matrix.module_name }} Status: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "* Workflow: ${{ github.workflow }}" >> $GITHUB_STEP_SUMMARY
          echo "* Run ID: ${{ github.run_id }}" >> $GITHUB_STEP_SUMMARY
          echo "* Triggered by: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "* Branch: ${{ github.ref }}" >> $GITHUB_STEP_SUMMARY

  e2e-cli:
    name: E2E (${{ matrix.suite }}/${{ matrix.platform }})
    needs: tests
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    env:
      CHEF_LICENSE: accept-no-persist
    strategy:
      fail-fast: false
      matrix:
        include:
          - suite: default
            platform: ubuntu
            os: ubuntu-latest
            fixture_pattern: bbl-install-linux-*-files
            kitchen_instance: default-ubuntu # includes all ubuntu targets
          - suite: default
            platform: macos
            os: macos-latest
            fixture_pattern: bbl-install-macos-*-files
            kitchen_instance: default-macos-local
          - suite: pkg_install_macos
            platform: macos
            os: macos-latest
            fixture_pattern: bbl-install-macos-pkg-files
            kitchen_instance: pkg-install-macos-macos-local
          - suite: homebrew_install_macos
            platform: macos
            os: macos-latest
            fixture_pattern: bbl-install-macos-homebrew-files
            kitchen_instance: homebrew-install-macos-macos-local
          - suite: deb_install_ubuntu
            platform: ubuntu
            os: ubuntu-latest
            fixture_pattern: bbl-install-linux-deb-files
            kitchen_instance: deb-install-ubuntu-2604
          - suite: rpm_install_fedora
            platform: fedora
            os: ubuntu-latest
            fixture_pattern: bbl-install-linux-rpm-files
            kitchen_instance: rpm-install-fedora-fedora-latest
          - suite: pacman_install_archlinux
            platform: archlinux
            os: ubuntu-latest
            fixture_pattern: bbl-install-linux-archlinux-files
            kitchen_instance: pacman-install-archlinux-archlinux-latest

          # Disabled until https://github.com/nehemiaharchives/lucene-kmp/issues/262 is fixed.
          # - suite: apk_install_alpine
          #   platform: alpine
          #   os: ubuntu-latest
          #   fixture_pattern: bbl-install-linux-alpine-files
          #   kitchen_instance: apk-install-alpine-alpine-latest
          - suite: default
            platform: mingw
            os: windows-latest
            fixture_pattern: bbl-install-windows-*-files
            kitchen_instance: default-windows-local

          - suite: pack_install_posix
            platform: ubuntu
            os: ubuntu-latest
            fixture_pattern: bbl-install-linux-*-files
            kitchen_instance: pack-install-posix-ubuntu # includes all ubuntu targets
          - suite: pack_install_posix
            platform: macos
            os: macos-latest
            fixture_pattern: bbl-install-macos-*-files
            kitchen_instance: pack-install-posix-macos-local
          - suite: pack_install_windows
            platform: mingw
            os: windows-latest
            fixture_pattern: bbl-install-windows-*-files
            kitchen_instance: pack-install-windows-windows-local

          - suite: search_posix
            platform: ubuntu
            os: ubuntu-latest
            fixture_pattern: bbl-install-linux-*-files
            kitchen_instance: search-posix-ubuntu-2604 # only on 26 to save time
            search_throttle: 2
          - suite: search_posix
            platform: macos
            os: macos-latest
            fixture_pattern: bbl-install-macos-*-files
            kitchen_instance: search-posix-macos-local
            search_throttle: 2
          - suite: config_posix
            platform: ubuntu
            os: ubuntu-latest
            fixture_pattern: bbl-install-linux-*-files
            kitchen_instance: config-posix-ubuntu-2604 # only on 26 to save time
          - suite: config_posix
            platform: macos
            os: macos-latest
            fixture_pattern: bbl-install-macos-*-files
            kitchen_instance: config-posix-macos-local
          - suite: completion_posix
            platform: ubuntu
            os: ubuntu-latest
            fixture_pattern: bbl-install-linux-*-files
            kitchen_instance: completion-posix-ubuntu-2604
          - suite: completion_posix
            platform: macos
            os: macos-latest
            fixture_pattern: bbl-install-macos-*-files
            kitchen_instance: completion-posix-macos-local
          - suite: config_windows
            platform: mingw
            os: windows-latest
            fixture_pattern: bbl-install-windows-*-files
            kitchen_instance: config-windows-windows-local
          - suite: search_windows
            platform: mingw
            os: windows-latest
            fixture_pattern: bbl-install-windows-*-files
            kitchen_instance: search-windows-windows-local
          - suite: completion_windows
            platform: mingw
            os: windows-latest
            fixture_pattern: bbl-install-windows-*-files
            kitchen_instance: completion-windows-windows-local
          - suite: msi_install_windows
            platform: mingw
            os: windows-latest
            fixture_pattern: bbl-install-windows-msi-files
            kitchen_instance: msi-install-windows-windows-local

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Download shared install fixtures
        uses: actions/download-artifact@v4
        with:
          pattern: ${{ matrix.fixture_pattern }}
          path: bbl_install/files
          merge-multiple: true

      - name: Prepare Kitchen cookbook files (Linux)
        # Add `|| matrix.platform == 'alpine'` when lucene-kmp issue #262 is fixed.
        if: ${{ matrix.platform == 'ubuntu' || matrix.platform == 'fedora' || matrix.platform == 'archlinux' }}
        shell: bash
        run: |
          set -euo pipefail
          # Enable this branch together with the Alpine matrix rows after issue #262 is fixed:
          # if [ "${{ matrix.suite }}" = "apk_install_alpine" ]; then
          #   fixture_dir=bbl_install/files/linux/alpine
          #   if [ -f bbl_install/files/bbl.apk ]; then
          #     :
          #   elif [ -f "$fixture_dir/bbl.apk" ]; then
          #     cp "$fixture_dir/bbl.apk" bbl_install/files/bbl.apk
          #   else
          #     echo "Missing bbl.apk" >&2
          #     find bbl_install/files -maxdepth 5 -type f | sort
          #     exit 1
          #   fi
          #   if [ -f "$fixture_dir/version.txt" ]; then
          #     cp "$fixture_dir/version.txt" bbl_install/files/version.txt
          #   elif [ -f bbl_install/files/common/version.txt ]; then
          #     cp bbl_install/files/common/version.txt bbl_install/files/version.txt
          #   fi
          #   test -f bbl_install/files/bbl.apk
          #   test -f bbl_install/files/version.txt
          #   du -sh bbl_install/files
          #   exit 0
          # fi

          if [ "${{ matrix.suite }}" = "pacman_install_archlinux" ]; then
            fixture_dir=bbl_install/files/linux/archlinux

            if [ -f bbl_install/files/bbl.pkg.tar.zst ]; then
              :
            elif [ -f "$fixture_dir/bbl.pkg.tar.zst" ]; then
              cp "$fixture_dir/bbl.pkg.tar.zst" bbl_install/files/bbl.pkg.tar.zst
            else
              echo "Missing bbl.pkg.tar.zst" >&2
              find bbl_install/files -maxdepth 5 -type f | sort
              exit 1
            fi

            if [ -f "$fixture_dir/version.txt" ]; then
              cp "$fixture_dir/version.txt" bbl_install/files/version.txt
            elif [ -f bbl_install/files/common/version.txt ]; then
              cp bbl_install/files/common/version.txt bbl_install/files/version.txt
            fi

            test -f bbl_install/files/bbl.pkg.tar.zst
            test -f bbl_install/files/version.txt
            du -sh bbl_install/files
            exit 0
          fi

          if [ "${{ matrix.suite }}" = "rpm_install_fedora" ]; then
            fixture_dir=bbl_install/files/linux/rpm

            if [ -f bbl_install/files/bbl.rpm ]; then
              :
            elif [ -f "$fixture_dir/bbl.rpm" ]; then
              cp "$fixture_dir/bbl.rpm" bbl_install/files/bbl.rpm
            else
              echo "Missing bbl.rpm" >&2
              find bbl_install/files -maxdepth 5 -type f | sort
              exit 1
            fi

            if [ -f "$fixture_dir/version.txt" ]; then
              cp "$fixture_dir/version.txt" bbl_install/files/version.txt
            elif [ -f bbl_install/files/common/version.txt ]; then
              cp bbl_install/files/common/version.txt bbl_install/files/version.txt
            fi

            test -f bbl_install/files/bbl.rpm
            test -f bbl_install/files/version.txt
            du -sh bbl_install/files
            exit 0
          fi

          if [ "${{ matrix.suite }}" = "deb_install_ubuntu" ]; then
            fixture_dir=bbl_install/files/linux/deb
            if [ -f bbl_install/files/bbl.deb ]; then
              :
            elif [ -f "$fixture_dir/bbl.deb" ]; then
              cp "$fixture_dir/bbl.deb" bbl_install/files/bbl.deb
            else
              echo "Missing bbl.deb" >&2
              find bbl_install/files -maxdepth 5 -type f | sort
              exit 1
            fi

            if [ -f "$fixture_dir/version.txt" ]; then
              cp "$fixture_dir/version.txt" bbl_install/files/version.txt
            elif [ -f bbl_install/files/common/version.txt ]; then
              cp bbl_install/files/common/version.txt bbl_install/files/version.txt
            fi

            test -f bbl_install/files/bbl.deb
            dpkg-deb --info bbl_install/files/bbl.deb
            dpkg-deb --contents bbl_install/files/bbl.deb | tee /tmp/bbl-deb-contents.txt

            grep -qE '/usr/bin/bbl$' /tmp/bbl-deb-contents.txt
            grep -qE '/home/ubuntu/.bbl/bin/bbl-search-common$' /tmp/bbl-deb-contents.txt
            grep -qE '/home/ubuntu/.bbl/packs/webus.zip$' /tmp/bbl-deb-contents.txt

            if grep -qE '/usr/lib/bbl|/usr/share/bbl|/usr/local|/home/ubuntu/.bbl/webus.zip$' /tmp/bbl-deb-contents.txt; then
              echo "Deb package contains rejected install locations" >&2
              exit 1
            fi

            du -sh bbl_install/files
            exit 0
          fi

          cp bbl_install/files/common/version.txt bbl_install/files/version.txt
          find bbl_install/files/linux -mindepth 2 -maxdepth 2 -type f -exec cp {} bbl_install/files/ \;
          
          rm -rf bbl_install/files/common
          rm -rf bbl_install/files/linux
          rm -rf bbl_install/files/macosArm64
          rm -rf bbl_install/files/macosX64
          rm -rf bbl_install/files/windows
          
          test -f bbl_install/files/version.txt
          test -f bbl_install/files/bbl
          test -f bbl_install/files/bbl-search-common
          test -f bbl_install/files/kjv.zip
          test -f bbl_install/files/bbl.bash
          test -f bbl_install/files/_bbl
          test -f bbl_install/files/bbl.fish
          
          du -sh bbl_install/files

      - name: Pull Arch Linux Docker image
        if: ${{ matrix.platform == 'archlinux' }}
        run: docker pull archlinux/archlinux:latest

      # Disabled until https://github.com/nehemiaharchives/lucene-kmp/issues/262 is fixed.
      # - name: Pull Alpine Docker image
      #   if: ${{ matrix.platform == 'alpine' }}
      #   run: docker pull alpine:latest

      - name: Prepare Kitchen cookbook files (Windows)
        if: ${{ matrix.platform == 'mingw' }}
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          if ('${{ matrix.suite }}' -eq 'msi_install_windows') {
              $fixtureDir = 'bbl_install\files\windows\msi'

              if (-not (Test-Path "$fixtureDir\bbl.msi")) { throw "Missing $fixtureDir\bbl.msi" }
              if (-not (Test-Path "$fixtureDir\version.txt")) { throw "Missing $fixtureDir\version.txt" }

              Copy-Item "$fixtureDir\bbl.msi" bbl_install\files\bbl.msi -Force
              Copy-Item "$fixtureDir\version.txt" bbl_install\files\version.txt -Force

              Remove-Item bbl_install\files\common -Recurse -Force -ErrorAction SilentlyContinue
              Remove-Item bbl_install\files\linux -Recurse -Force -ErrorAction SilentlyContinue
              Remove-Item bbl_install\files\macosArm64 -Recurse -Force -ErrorAction SilentlyContinue
              Remove-Item bbl_install\files\macosX64 -Recurse -Force -ErrorAction SilentlyContinue
              Remove-Item bbl_install\files\windows -Recurse -Force -ErrorAction SilentlyContinue

              if (-not (Test-Path bbl_install\files\bbl.msi)) { throw 'Missing bbl_install\files\bbl.msi' }
              if (-not (Test-Path bbl_install\files\version.txt)) { throw 'Missing bbl_install\files\version.txt' }
              Get-ChildItem bbl_install\files
              exit 0
          }

          Copy-Item bbl_install\files\common\version.txt bbl_install\files\version.txt -Force
          Get-ChildItem bbl_install\files\windows -File -Recurse | Copy-Item -Destination bbl_install\files -Force

          Remove-Item bbl_install\files\common -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item bbl_install\files\linux -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item bbl_install\files\macosArm64 -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item bbl_install\files\macosX64 -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item bbl_install\files\windows -Recurse -Force -ErrorAction SilentlyContinue

          if (-not (Test-Path bbl_install\files\version.txt)) { throw 'Missing bbl_install\files\version.txt' }
          if (-not (Test-Path bbl_install\files\bbl.exe)) { throw 'Missing bbl_install\files\bbl.exe' }
          if (-not (Test-Path bbl_install\files\bbl-search-common.exe)) { throw 'Missing bbl_install\files\bbl-search-common.exe' }
          if (-not (Test-Path bbl_install\files\kjv.zip)) { throw 'Missing bbl_install\files\kjv.zip' }
          if (-not (Test-Path bbl_install\files\_bbl.ps1)) { throw 'Missing bbl_install\files\_bbl.ps1' }

          Get-ChildItem bbl_install\files

      - name: Prepare Kitchen cookbook files (macOS)
        if: ${{ matrix.platform == 'macos' }}
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ matrix.suite }}" = "homebrew_install_macos" ]; then
            fixture_dir=bbl_install/files/macosArm64/homebrew
            test -d "$fixture_dir"
            mkdir -p bbl_install/files/Formula
            cp "$fixture_dir/bbl.tar.gz" bbl_install/files/bbl.tar.gz
            cp "$fixture_dir/Formula/bbl.rb" bbl_install/files/Formula/bbl.rb
            cp "$fixture_dir/version.txt" bbl_install/files/version.txt
            grep -q 'homepage "https://github.com/nehemiaharchives/bbl"' bbl_install/files/Formula/bbl.rb
            grep -q 'libexec.install "bbl", "bbl-search-common"' bbl_install/files/Formula/bbl.rb
            grep -q '(bin/"bbl").write' bbl_install/files/Formula/bbl.rb
            tar -tzf bbl_install/files/bbl.tar.gz | tee /tmp/bbl-homebrew-tar-list.txt
            grep -qx 'bbl' /tmp/bbl-homebrew-tar-list.txt
            grep -qx 'bbl-search-common' /tmp/bbl-homebrew-tar-list.txt
            grep -qx 'webus.zip' /tmp/bbl-homebrew-tar-list.txt
            du -sh bbl_install/files
            exit 0
          fi

          if [ "${{ matrix.suite }}" = "pkg_install_macos" ]; then
            if [ -f bbl_install/files/bbl.pkg ]; then
              :
            elif [ -f bbl_install/files/macosArm64/pkg/bbl.pkg ]; then
              cp bbl_install/files/macosArm64/pkg/bbl.pkg bbl_install/files/bbl.pkg
            else
              echo "Missing bbl.pkg" >&2
              find bbl_install/files -maxdepth 5 -type f | sort
              exit 1
            fi
            test -f bbl_install/files/bbl.pkg
            du -sh bbl_install/files
            exit 0
          fi

          cp bbl_install/files/common/version.txt bbl_install/files/version.txt

          case "$(uname -m)" in
            arm64) fixture_dir=bbl_install/files/macosArm64 ;;
            x86_64) fixture_dir=bbl_install/files/macosX64 ;;
            *) echo "Unsupported macOS runner architecture: $(uname -m)" >&2; exit 1 ;;
          esac

          if [ ! -d "$fixture_dir" ]; then
            echo "Missing macOS fixture directory for $(uname -m): $fixture_dir" >&2
            exit 1
          fi

          find "$fixture_dir" -mindepth 2 -maxdepth 2 -type f -exec cp {} bbl_install/files/ \;

          rm -rf bbl_install/files/common
          rm -rf bbl_install/files/linux
          rm -rf bbl_install/files/macosArm64
          rm -rf bbl_install/files/macosX64
          rm -rf bbl_install/files/windows

          test -f bbl_install/files/version.txt
          test -f bbl_install/files/bbl
          test -f bbl_install/files/bbl-search-common
          test -f bbl_install/files/kjv.zip
          test -f bbl_install/files/bbl.bash
          test -f bbl_install/files/_bbl
          test -f bbl_install/files/bbl.fish

          du -sh bbl_install/files

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
          working-directory: bbl_install

      - name: Install PowerShell 7+
        if: ${{ (matrix.suite == 'search_windows' || matrix.suite == 'config_windows' || matrix.suite == 'completion_windows') && matrix.platform == 'mingw' }}
        uses: PSModule/install-powershell@v1
        with:
          Version: 7.6.2

      - name: Verify PowerShell version
        if: ${{ (matrix.suite == 'search_windows' || matrix.suite == 'config_windows' || matrix.suite == 'completion_windows') && matrix.platform == 'mingw' }}
        shell: pwsh
        run: |
          Write-Host "Using PowerShell $($PSVersionTable.PSVersion)"
          if ($PSVersionTable.PSVersion.Major -lt 7) {
            throw "PowerShell 7+ is required for Windows E2E tests"
          }

      # A standard GitHub-hosted Linux runner has 14 GB of storage. Some matrix
      # patterns select four Ubuntu instances, and keeping every converged
      # container alive until a later verify step duplicates the cookbook files
      # in each container. Run instances serially and destroy each one even when
      # it fails so the next instance starts with the released Docker space.
      # Let Dokken pull images directly: caching a docker-save tar keeps both the
      # archive and the loaded image on disk during the most space-intensive step.
      - name: Kitchen test
        working-directory: bbl_install
        shell: bash
        # Add `|| matrix.platform == 'alpine'` when lucene-kmp issue #262 is fixed.
        if: ${{ matrix.platform == 'ubuntu' || matrix.platform == 'fedora' || matrix.platform == 'archlinux' }}
        env:
          BBL_SEARCH_POSIX_THROTTLE: ${{ matrix.search_throttle || '1' }}
        run: bundle exec kitchen test '${{ matrix.kitchen_instance }}' --concurrency=1 --destroy=always

      - name: Kitchen converge
        working-directory: bbl_install
        shell: bash
        if: ${{ matrix.platform == 'macos' }}
        run: bundle exec kitchen converge '${{ matrix.kitchen_instance }}'

      - name: Kitchen converge
        working-directory: bbl_install
        shell: pwsh
        if: ${{ matrix.platform == 'mingw' }}
        run: |
          $env:RUBY_EXE = (Get-Command ruby).Source
          bundle exec kitchen converge '${{ matrix.kitchen_instance }}'

      - name: Kitchen verify
        working-directory: bbl_install
        shell: bash
        if: ${{ matrix.platform == 'macos' }}
        env:
          BBL_SEARCH_POSIX_THROTTLE: ${{ matrix.search_throttle || '1' }}
        run: bundle exec kitchen verify '${{ matrix.kitchen_instance }}'

      - name: Kitchen verify
        working-directory: bbl_install
        shell: pwsh
        if: ${{ matrix.platform == 'mingw' }}
        run: |
          $env:RUBY_EXE = (Get-Command ruby).Source
          bundle exec kitchen verify '${{ matrix.kitchen_instance }}'

      - name: Build Summary
        if: always()
        run: |
          echo "### E2E (${{ matrix.suite }}/${{ matrix.platform }}) Status: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "* Workflow: ${{ github.workflow }}" >> $GITHUB_STEP_SUMMARY
          echo "* Run ID: ${{ github.run_id }}" >> $GITHUB_STEP_SUMMARY
          echo "* Triggered by: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "* Branch: ${{ github.ref }}" >> $GITHUB_STEP_SUMMARY
