name: CI

on:
  push:
    branches: [ master ]
    paths-ignore:
      - '**.md'
      - '**.sh'
  pull_request:
    branches: [ master ]
    paths-ignore:
      - '**.md'
      - '**.sh'

jobs:
  tests:
    name: ${{ matrix.job_type }} (${{ matrix.platform }}/${{ matrix.module_name }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: ${{ matrix.timeout }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: jvm
            module_name: shared
            os: ubuntu-latest
            timeout: 10
            task: :shared:jvmTest
            job_type: Test
          - platform: android
            module_name: shared
            os: ubuntu-latest
            timeout: 15
            task: :shared:testAndroidHostTest
            needs_android: true
            job_type: Test
          - platform: ios
            module_name: shared
            os: macos-latest
            timeout: 20
            task: :shared:iosSimulatorArm64Test
            needs_konan_cache: true
            job_type: Test
          - platform: linux
            module_name: shared
            os: ubuntu-latest
            timeout: 20
            task: :shared:linuxX64Test
            needs_konan_cache: true
            job_type: Test
          - platform: mingw
            module_name: shared
            os: windows-latest
            timeout: 25
            task: :shared:mingwX64Test
            needs_konan_cache: true
            job_type: Test

          - platform: jvm
            module_name: cli-core
            os: ubuntu-latest
            timeout: 10
            task: :cli:core:jvmTest
            job_type: Test
          - platform: linux
            module_name: cli-core
            os: ubuntu-latest
            timeout: 60
            task: :cli:core:linuxX64Test
            needs_konan_cache: true
            fixture_task: :cli:core:linkReleaseExecutableLinuxX64 "-Pbblpacks.embed=false"
            fixture_artifact_name: bbl-install-linux-cli-core-files
            fixture_binary_path: cli/core/build/bin/linuxX64/releaseExecutable/bbl.kexe
            fixture_output_name: bbl
            fixture_include_packs: true
            job_type: Test
          - platform: macos
            module_name: cli-core
            os: macos-latest
            timeout: 60
            task: :cli:core:macosArm64Test
            needs_konan_cache: true
            needs_xcode: true
            xcode_version: '16.4'
            fixture_task: stageBblInstallMacosFixtures "-Pbblpacks.embed=false"
            fixture_artifact_name: bbl-install-macos-files
            fixture_staged: true
            job_type: Test
          - platform: mingw
            module_name: cli-core
            os: windows-latest
            timeout: 75
            task: :cli:core:mingwX64Test
            needs_konan_cache: true
            fixture_task: :cli:core:linkReleaseExecutableMingwX64 "-Pbblpacks.embed=false"
            fixture_artifact_name: bbl-install-windows-cli-core-files
            fixture_binary_path: cli/core/build/bin/mingwX64/releaseExecutable/bbl.exe
            fixture_output_name: bbl.exe
            fixture_include_packs: true
            job_type: Test

          - platform: jvm
            module_name: cli-search-common
            os: ubuntu-latest
            timeout: 10
            task: :cli:search:common:jvmTest
            job_type: Test
          - platform: linux
            module_name: cli-search-common
            os: ubuntu-latest
            timeout: 20
            task: :cli:search:common:linuxX64Test
            needs_konan_cache: true
            fixture_task: :cli:search:common:linkReleaseExecutableLinuxX64 "-Pbblpacks.embed=false"
            fixture_artifact_name: bbl-install-linux-cli-search-common-files
            fixture_binary_path: cli/search/common/build/bin/linuxX64/releaseExecutable/bbl-search-common.kexe
            fixture_output_name: bbl-search-common
            job_type: Test
          - platform: mingw
            module_name: cli-search-common
            os: windows-latest
            timeout: 25
            task: :cli:search:common:mingwX64Test
            needs_konan_cache: true
            fixture_task: :cli:search:common:linkReleaseExecutableMingwX64 "-Pbblpacks.embed=false"
            fixture_artifact_name: bbl-install-windows-cli-search-common-files
            fixture_binary_path: cli/search/common/build/bin/mingwX64/releaseExecutable/bbl-search-common.exe
            fixture_output_name: bbl-search-common.exe
            job_type: Test

          - platform: jvm
            module_name: cli-search-extra
            os: ubuntu-latest
            timeout: 10
            task: :cli:search:extra:jvmTest
            job_type: Test
          - platform: linux
            module_name: cli-search-extra
            os: ubuntu-latest
            timeout: 20
            task: :cli:search:extra:linuxX64Test
            needs_konan_cache: true
            fixture_task: :cli:search:extra:linkReleaseExecutableLinuxX64 "-Pbblpacks.embed=false"
            fixture_artifact_name: bbl-install-linux-cli-search-extra-files
            fixture_binary_path: cli/search/extra/build/bin/linuxX64/releaseExecutable/bbl-search-extra.kexe
            fixture_output_name: bbl-search-extra
            job_type: Test
          - platform: mingw
            module_name: cli-search-extra
            os: windows-latest
            timeout: 25
            task: :cli:search:extra:mingwX64Test
            needs_konan_cache: true
            fixture_task: :cli:search:extra:linkReleaseExecutableMingwX64 "-Pbblpacks.embed=false"
            fixture_artifact_name: bbl-install-windows-cli-search-extra-files
            fixture_binary_path: cli/search/extra/build/bin/mingwX64/releaseExecutable/bbl-search-extra.exe
            fixture_output_name: bbl-search-extra.exe
            job_type: Test

          - platform: jvm
            module_name: cli-search-kuromoji
            os: ubuntu-latest
            timeout: 10
            task: :cli:search:kuromoji:jvmTest
            job_type: Test
          - platform: linux
            module_name: cli-search-kuromoji
            os: ubuntu-latest
            timeout: 20
            task: :cli:search:kuromoji:linuxX64Test
            needs_konan_cache: true
            fixture_task: :cli:search:kuromoji:linkReleaseExecutableLinuxX64 "-Pbblpacks.embed=false"
            fixture_artifact_name: bbl-install-linux-cli-search-kuromoji-files
            fixture_binary_path: cli/search/kuromoji/build/bin/linuxX64/releaseExecutable/bbl-search-kuromoji.kexe
            fixture_output_name: bbl-search-kuromoji
            job_type: Test
          - platform: mingw
            module_name: cli-search-kuromoji
            os: windows-latest
            timeout: 25
            task: :cli:search:kuromoji:mingwX64Test
            needs_konan_cache: true
            fixture_task: :cli:search:kuromoji:linkReleaseExecutableMingwX64 "-Pbblpacks.embed=false"
            fixture_artifact_name: bbl-install-windows-cli-search-kuromoji-files
            fixture_binary_path: cli/search/kuromoji/build/bin/mingwX64/releaseExecutable/bbl-search-kuromoji.exe
            fixture_output_name: bbl-search-kuromoji.exe
            job_type: Test

          - platform: jvm
            module_name: cli-search-morfologik
            os: ubuntu-latest
            timeout: 10
            task: :cli:search:morfologik:jvmTest
            job_type: Test
          - platform: linux
            module_name: cli-search-morfologik
            os: ubuntu-latest
            timeout: 20
            task: :cli:search:morfologik:linuxX64Test
            needs_konan_cache: true
            fixture_task: :cli:search:morfologik:linkReleaseExecutableLinuxX64 "-Pbblpacks.embed=false"
            fixture_artifact_name: bbl-install-linux-cli-search-morfologik-files
            fixture_binary_path: cli/search/morfologik/build/bin/linuxX64/releaseExecutable/bbl-search-morfologik.kexe
            fixture_output_name: bbl-search-morfologik
            job_type: Test
          - platform: mingw
            module_name: cli-search-morfologik
            os: windows-latest
            timeout: 25
            task: :cli:search:morfologik:mingwX64Test
            needs_konan_cache: true
            fixture_task: :cli:search:morfologik:linkReleaseExecutableMingwX64 "-Pbblpacks.embed=false"
            fixture_artifact_name: bbl-install-windows-cli-search-morfologik-files
            fixture_binary_path: cli/search/morfologik/build/bin/mingwX64/releaseExecutable/bbl-search-morfologik.exe
            fixture_output_name: bbl-search-morfologik.exe
            job_type: Test

          - platform: jvm
            module_name: cli-search-nori
            os: ubuntu-latest
            timeout: 10
            task: :cli:search:nori:jvmTest
            job_type: Test
          - platform: linux
            module_name: cli-search-nori
            os: ubuntu-latest
            timeout: 20
            task: :cli:search:nori:linuxX64Test
            needs_konan_cache: true
            fixture_task: :cli:search:nori:linkReleaseExecutableLinuxX64 "-Pbblpacks.embed=false"
            fixture_artifact_name: bbl-install-linux-cli-search-nori-files
            fixture_binary_path: cli/search/nori/build/bin/linuxX64/releaseExecutable/bbl-search-nori.kexe
            fixture_output_name: bbl-search-nori
            job_type: Test
          - platform: mingw
            module_name: cli-search-nori
            os: windows-latest
            timeout: 25
            task: :cli:search:nori:mingwX64Test
            needs_konan_cache: true
            fixture_task: :cli:search:nori:linkReleaseExecutableMingwX64 "-Pbblpacks.embed=false"
            fixture_artifact_name: bbl-install-windows-cli-search-nori-files
            fixture_binary_path: cli/search/nori/build/bin/mingwX64/releaseExecutable/bbl-search-nori.exe
            fixture_output_name: bbl-search-nori.exe
            job_type: Test

          - platform: jvm
            module_name: cli-search-smartcn
            os: ubuntu-latest
            timeout: 10
            task: :cli:search:smartcn:jvmTest
            job_type: Test
          - platform: linux
            module_name: cli-search-smartcn
            os: ubuntu-latest
            timeout: 20
            task: :cli:search:smartcn:linuxX64Test
            needs_konan_cache: true
            fixture_task: :cli:search:smartcn:linkReleaseExecutableLinuxX64 "-Pbblpacks.embed=false"
            fixture_artifact_name: bbl-install-linux-cli-search-smartcn-files
            fixture_binary_path: cli/search/smartcn/build/bin/linuxX64/releaseExecutable/bbl-search-smartcn.kexe
            fixture_output_name: bbl-search-smartcn
            job_type: Test
          - platform: mingw
            module_name: cli-search-smartcn
            os: windows-latest
            timeout: 25
            task: :cli:search:smartcn:mingwX64Test
            needs_konan_cache: true
            fixture_task: :cli:search:smartcn:linkReleaseExecutableMingwX64 "-Pbblpacks.embed=false"
            fixture_artifact_name: bbl-install-windows-cli-search-smartcn-files
            fixture_binary_path: cli/search/smartcn/build/bin/mingwX64/releaseExecutable/bbl-search-smartcn.exe
            fixture_output_name: bbl-search-smartcn.exe
            job_type: Test

          - platform: jvm
            module_name: composeApp
            os: ubuntu-latest
            timeout: 10
            task: :composeApp:jvmTest
            job_type: Test
          - platform: android
            module_name: composeApp
            os: ubuntu-latest
            timeout: 15
            task: :composeApp:testAndroidHostTest
            needs_android: true
            job_type: Test
          - platform: ios
            module_name: composeApp
            os: macos-latest
            timeout: 25
            task: :composeApp:iosSimulatorArm64Test
            needs_konan_cache: true
            job_type: Test

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up JDK 24
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '24'

      - name: Set up Android SDK
        if: ${{ matrix.needs_android }}
        uses: android-actions/setup-android@v3

      - name: Setup Xcode
        if: ${{ matrix.needs_xcode }}
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ matrix.xcode_version }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Konan Cache
        if: ${{ matrix.needs_konan_cache }}
        uses: actions/cache@v4
        with:
          path: ~/.konan
          key: ${{ runner.os }}-konan-${{ hashFiles('*.gradle.kts', 'gradle/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-konan-

      - name: Run task
        run: ./gradlew ${{ matrix.task }}

      - name: Run fixture task
        if: ${{ matrix.fixture_task }}
        run: ./gradlew ${{ matrix.fixture_task }}

      - name: Stage fixture artifact
        if: ${{ matrix.fixture_task && !matrix.fixture_staged }}
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force bbl_install/files | Out-Null
          Copy-Item -Path "${{ matrix.fixture_binary_path }}" -Destination "bbl_install/files/${{ matrix.fixture_output_name }}" -Force
          if ("${{ matrix.fixture_include_packs }}" -eq "true") {
            Copy-Item -Path "server/src/main/resources/files/bblpacks/*.zip" -Destination "bbl_install/files" -Force
          }

      - name: Upload fixture artifact
        if: ${{ matrix.fixture_artifact_name }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.fixture_artifact_name }}
          path: bbl_install/files/
          if-no-files-found: error
          retention-days: 1

      - name: Build Summary
        if: always()
        run: |
          echo "### ${{ matrix.platform }} - ${{ matrix.module_name }} Status: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "* Workflow: ${{ github.workflow }}" >> $GITHUB_STEP_SUMMARY
          echo "* Run ID: ${{ github.run_id }}" >> $GITHUB_STEP_SUMMARY
          echo "* Triggered by: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "* Branch: ${{ github.ref }}" >> $GITHUB_STEP_SUMMARY

  e2e-linux-cli:
    name: E2E (linux/cli)
    needs: tests
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Download shared install fixtures
        uses: actions/download-artifact@v4
        with:
          pattern: bbl-install-linux-*-files
          path: bbl_install/files
          merge-multiple: true

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
          working-directory: bbl_install

      - name: Restore Dokken Docker image
        id: cache-dokken-image
        uses: actions/cache@v4
        with:
          path: /tmp/docker-cache/dokken-ubuntu-24.04.tar
          key: dokken-ubuntu-24.04-v1

      - name: Load cached Dokken Docker image
        if: steps.cache-dokken-image.outputs.cache-hit == 'true'
        run: docker load --input /tmp/docker-cache/dokken-ubuntu-24.04.tar

      - name: Pull Dokken Docker image
        if: steps.cache-dokken-image.outputs.cache-hit != 'true'
        run: docker pull dokken/ubuntu-24.04

      - name: Save Dokken Docker image
        if: steps.cache-dokken-image.outputs.cache-hit != 'true'
        run: |
          mkdir -p /tmp/docker-cache
          docker save dokken/ubuntu-24.04 --output /tmp/docker-cache/dokken-ubuntu-24.04.tar

      - name: Kitchen create
        working-directory: bbl_install
        run: bundle exec kitchen create default-ubuntu-2404

      - name: Kitchen converge
        working-directory: bbl_install
        run: bundle exec kitchen converge default-ubuntu-2404

      - name: Kitchen verify
        working-directory: bbl_install
        run: bundle exec kitchen verify default-ubuntu-2404

      - name: Build Summary
        if: always()
        run: |
          echo "### E2E (linux/cli) Status: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "* Workflow: ${{ github.workflow }}" >> $GITHUB_STEP_SUMMARY
          echo "* Run ID: ${{ github.run_id }}" >> $GITHUB_STEP_SUMMARY
          echo "* Triggered by: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "* Branch: ${{ github.ref }}" >> $GITHUB_STEP_SUMMARY

  e2e-mingw-cli:
    name: E2E (mingw/cli)
    needs: tests
    runs-on: windows-latest
    timeout-minutes: 90

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Download shared install fixtures
        uses: actions/download-artifact@v4
        with:
          pattern: bbl-install-windows-*-files
          path: bbl_install/files
          merge-multiple: true

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
          working-directory: bbl_install

      - name: Kitchen converge
        working-directory: bbl_install
        run: |
          $env:RUBY_EXE = (Get-Command ruby).Source
          bundle exec kitchen converge default-windows-local

      - name: Kitchen verify
        working-directory: bbl_install
        run: |
          $env:RUBY_EXE = (Get-Command ruby).Source
          bundle exec kitchen verify default-windows-local

      - name: Build Summary
        if: always()
        run: |
          echo "### E2E (mingw/cli) Status: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "* Workflow: ${{ github.workflow }}" >> $GITHUB_STEP_SUMMARY
          echo "* Run ID: ${{ github.run_id }}" >> $GITHUB_STEP_SUMMARY
          echo "* Triggered by: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "* Branch: ${{ github.ref }}" >> $GITHUB_STEP_SUMMARY
