#Kotlin
kotlin.code.style=official
kotlin.daemon.jvmargs=-Xmx32g
kotlin.native.jvmArgs=-Xmx16g
kotlin.native.cacheKind=none
kotlin.mpp.applyDefaultHierarchyTemplate=true
kotlin.compiler.execution.strategy=daemon

#Gradle
# Kotlin/Native compilation of embedded TAR ByteArrays is memory-hungry.
org.gradle.jvmargs=-Xmx24g -XX:MaxMetaspaceSize=1g -Dfile.encoding=UTF-8
# Configuration cache can cause issues with Compose iOS tasks; keep it off for now
org.gradle.configuration-cache=false
org.gradle.caching=true
# Default gradle logging level; keep at lifecycle so test failures are shown
org.gradle.logging.level=lifecycle
org.gradle.workers.max=1

# Ensure embedded bible packs are available for native tests even when Gradle is invoked from IDE.
# (The embed pipeline is otherwise disabled during IDE sync/IDE-invoked builds.)
bblpacks.embed=true

#Android
android.nonTransitiveRClass=true
android.useAndroidX=true
